apiVersion: apps/v1
kind: Deployment
metadata:
  name: karsajobs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: karsajobs

  template:
    metadata:
      labels:
        app: karsajobs

    spec:
      containers:
      - name: karsajobs
        image: <username-docker>/karsajobs:latest

        ports:
        - containerPort: 8080

        env:
        - name: MONGO_HOST
          value: mongodb-service

        - name: MONGO_PORT
          value: "27017"

        - name: MONGO_USER
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: MONGO_INITDB_ROOT_USERNAME

        - name: MONGO_PASS
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: MONGO_INITDB_ROOT_PASSWORD