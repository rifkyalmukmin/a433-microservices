apiVersion: apps/v1
kind: Deployment
metadata:
  name: karsajobs-ui
spec:
  replicas: 1

  selector:
    matchLabels:
      app: karsajobs-ui

  template:
    metadata:
      labels:
        app: karsajobs-ui

    spec:
      containers:
      - name: karsajobs-ui
        image: <username-docker>/karsajobs-ui:latest

        ports:
        - containerPort: 80